<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css?v=20">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <title>Travels</title>
    <style>
        .travels-wrap {
            max-width: 1000px;
            margin: 0 auto;
            padding: 120px 32px 150px;
        }
        .trip { margin-bottom: 48px; }
        .trip-head {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .trip-name {
            color: var(--ink);
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 500;
            letter-spacing: 0;
        }
        .trip-places {
            color: var(--muted);
            font-size: 14px;
        }
        .trip-blurb {
            color: var(--muted);
            font-size: 15px;
            margin: -6px 0 16px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 560px) {
            .grid { grid-template-columns: 1fr; }
        }
        .tile {
            position: relative;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            background: var(--fill);
            border: 1px solid var(--line);
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.24s ease, border-color 0.24s ease;
        }
        .tile:hover {
            transform: translateY(-3px);
            border-color: var(--line-strong);
        }
        .tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(0.12);
            transition: transform 0.4s ease, filter 0.3s ease;
        }
        .tile:hover img { filter: grayscale(0); transform: scale(1.03); }
        .tile .cap {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.6));
            color: #fff;
            font-size: 12px;
            padding: 24px 12px 10px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .tile:hover .cap { opacity: 1; }
        .tile.placeholder {
            cursor: default;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: none;
            border: 1px dashed var(--line-strong);
        }
        .tile.placeholder:hover { transform: none; box-shadow: none; }
        .ph-inner { color: var(--muted); font-size: 12px; padding: 10px; line-height: 1.5; }
        .ph-inner i { font-size: 22px; display: block; margin-bottom: 8px; color: var(--line-strong); }
        .ph-inner code { color: var(--muted); font-size: 11px; }
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(28, 28, 30, 0.82);
            backdrop-filter: blur(6px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 24px;
        }
        #lightbox.open { display: flex; }
        #lightbox img { max-width: 92vw; max-height: 82vh; border-radius: 12px; }
        #lightbox .lb-cap {
            color: #fff;
            font-size: 14px;
            margin-top: 16px;
            min-height: 18px;
        }
        #lightbox .lb-close {
            position: absolute;
            top: 20px;
            right: 26px;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
            line-height: 1;
        }
        #lightbox .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.16s ease;
        }
        #lightbox .lb-nav:hover { background: rgba(255, 255, 255, 0.3); }
        #lightbox .lb-prev { left: 20px; }
        #lightbox .lb-next { right: 20px; }
        #lightbox .lb-count {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.75);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="home-link"><i class="fas fa-arrow-left"></i> Home</a>
    <div class="travels-wrap">
        <p class="eyebrow reveal">Film &amp; feet</p>
        <h1 class="page-title reveal" style="--d: 80ms">Travels</h1>
        <p class="page-intro reveal" style="--d: 160ms">A few favorite shots.</p>

        <div id="gallery" class="reveal" style="--d: 240ms"></div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="lb-close" onclick="closeLightbox()">&times;</span>
        <button class="lb-nav lb-prev" aria-label="Previous photo" onclick="lbNav(event,-1)">&#8249;</button>
        <img id="lb-img" src="" alt="" onclick="event.stopPropagation()">
        <button class="lb-nav lb-next" aria-label="Next photo" onclick="lbNav(event,1)">&#8250;</button>
        <div class="lb-cap" id="lb-cap"></div>
        <div class="lb-count" id="lb-count"></div>
    </div>

    <script>
    const trips = [
        { id: "italy", name: "Italy", emoji: "🇮🇹", places: "Rome, Florence, San Gimignano", blurb: "Currently learning to speak Italian. Daje Roma!", photos: ["1.jpg", "2.jpg"] },
        { id: "switzerland", name: "Switzerland", emoji: "🇨🇭", places: "Zurich, Lucerne, Lauterbrunnen", blurb: "", photos: ["1.jpg", "2.jpg"] },
        { id: "cape-cod", name: "Cape Cod", emoji: "🏖️", places: "Summers on the Cape", blurb: "", photos: ["1.jpg", "2.jpg"] },
        { id: "pacific-northwest", name: "Pacific Northwest", emoji: "🌲", places: "Vancouver, Vancouver Island", blurb: "", photos: ["1.jpg", "2.jpg"] },
        { id: "new-york-city", name: "New York City", emoji: "🗽", places: "NYC", blurb: "", photos: ["1.jpg", "2.jpg"] },
        { id: "puerto-rico", name: "Puerto Rico", emoji: "🌴", places: "San Juan", blurb: "", photos: ["1.jpg", "2.jpg"] },
        { id: "south-africa", name: "South Africa", emoji: "🦓", places: "Orchestra tour", blurb: "", photos: ["1.jpg", "2.jpg"] },
        { id: "trumpet", name: "Trumpet", emoji: "🎺", places: "Music", blurb: "", photos: ["1.jpg", "2.jpg"] },
        { id: "climbing", name: "Rock climbing", emoji: "🧗", places: "", blurb: "", photos: ["1.jpg", "2.jpg"] }
    ];

    let lbGroup = [];
    let lbIndex = 0;

    function esc(s) {
        return String(s).replace(/[&<>"']/g, c => (
            {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]
        ));
    }

    function photoParts(trip, p) {
        const file = typeof p === "string" ? p : p.file;
        const caption = typeof p === "string" ? "" : (p.caption || "");
        return { src: "photos/" + trip.id + "/" + file, caption: caption };
    }

    function render() {
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = trips.map(trip => {
            const tiles = trip.photos.map((p, idx) => {
                const { src, caption } = photoParts(trip, p);
                const file = src.split("/").pop();
                const capHtml = caption ? '<div class="cap">' + esc(caption) + '</div>' : "";
                const ph = '<div class=\'ph-inner\'><i class=\'fas fa-camera\'></i>add <code>photos/'
                    + esc(trip.id) + "/" + esc(file) + '</code></div>';
                return '<div class="tile" '
                    + 'onclick="openLightbox(\'' + esc(trip.id) + '\',' + idx + ')">'
                    + '<img src="' + esc(src) + '" alt="' + esc(caption) + '" '
                    + 'onerror="this.parentNode.classList.add(\'placeholder\');'
                    + 'this.parentNode.onclick=null;'
                    + 'this.parentNode.innerHTML=\'' + ph.replace(/'/g, "\\'") + '\';">'
                    + capHtml
                    + '</div>';
            }).join("");
            const blurb = trip.blurb ? '<p class="trip-blurb">' + esc(trip.blurb) + '</p>' : "";
            return '<section class="trip">'
                + '<div class="trip-head">'
                + '<span class="trip-name">' + esc(trip.name) + ' ' + trip.emoji + '</span>'
                + '<span class="trip-places">' + esc(trip.places) + '</span>'
                + '</div>'
                + blurb
                + '<div class="grid">' + tiles + '</div>'
                + '</section>';
        }).join("");
    }

    function openLightbox(tripId, idx) {
        const trip = trips.find(t => t.id === tripId);
        lbGroup = trip.photos.map(p => photoParts(trip, p));
        lbIndex = idx;
        showLb();
        document.getElementById("lightbox").classList.add("open");
    }
    function showLb() {
        const cur = lbGroup[lbIndex];
        document.getElementById("lb-img").src = cur.src;
        document.getElementById("lb-cap").textContent = cur.caption || "";
        const multi = lbGroup.length > 1;
        document.getElementById("lb-count").textContent = multi ? (lbIndex + 1) + " / " + lbGroup.length : "";
        document.querySelector(".lb-prev").style.display = multi ? "flex" : "none";
        document.querySelector(".lb-next").style.display = multi ? "flex" : "none";
    }
    function lbNav(e, dir) {
        e.stopPropagation();
        const n = lbGroup.length;
        lbIndex = (lbIndex + dir + n) % n;
        showLb();
    }
    function closeLightbox() {
        document.getElementById("lightbox").classList.remove("open");
    }
    document.addEventListener("keydown", e => {
        if (!document.getElementById("lightbox").classList.contains("open")) return;
        if (e.key === "Escape") closeLightbox();
        else if (e.key === "ArrowLeft") lbNav(e, -1);
        else if (e.key === "ArrowRight") lbNav(e, 1);
    });

    render();
    </script>
</body>
</html>
